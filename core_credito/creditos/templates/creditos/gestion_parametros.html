<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Parámetros Globales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <a href="{% url 'director_escritorio' %}">&larr; Volver al Escritorio</a>
    <h2 class="mt-2">Gestión de Parámetros Globales</h2>
    <p class="text-muted">Estos valores afectan todos los cálculos de oferta de crédito en el sistema.</p>
    <hr>
    
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary mt-3">Guardar Cambios</button>
    </form>
</div>
</body>
</html>
